<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Label Generator</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    input[type="file"] {
      display: none;
    }

    .custom-file-upload {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      background-color: rgb(107, 107, 255);
      color: #ffffff;
      border: 2px solid white;
      border-radius: 25px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      width: fit-content;
    }

    .custom-file-upload:hover {
      background-color: rgb(77, 77, 255);
    }

    #printBtn {
      display: none;
      margin: 10px auto;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      background-color: rgb(255, 73, 73);
      color: #ffffff;
      border: 2px solid white;
      border-radius: 25px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }

    #printBtn:hover {
      background-color: rgb(255, 52, 52);
    }

    .label {
      width: 1.58in;
      height: 2.36in;
      padding: 0.10in;
      margin-bottom: 5px;
      margin-right: 1px;
      background: #ffffff;
      border-radius: 0.15in;
      box-sizing: border-box;
      font-size: 7px;
      line-height: 1.1;
      overflow: hidden;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      vertical-align: top;
      position: relative;
      border: 1px solid #00000057;
      text-align: left;
    }

    .label-content {
      width: 100%;
    }

    .bold {
      font-weight: bold;
      text-transform: uppercase;
    }

    .section {
      font-size: 8px;
      margin-bottom: 2px;
      font-weight: 800;
    }

    .section1 {
      margin-bottom: 2px;
      font-size: 8px;
    }

    .barcode-container {
      text-align: center;
    }

    .barcode {
      width: 85%;
      height: 22.5px;
    }

    .mrp {
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      margin-top: 3px;
    }

    .mrp small {
      display: block;
      font-weight: normal;
      font-size: 8px;
    }

    .vcode-circle {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 22px;
      height: 22px;
      background: rgba(255, 255, 255, 0);
      color: black;
      font-weight: bolder;
      font-size: 8px;
      border-radius: 50%;
      text-align: center;
      line-height: 22px;
      z-index: 10;
      border: none;
    }

    #inlineErrorBox {
      display: none;
      border: 1px solid #f5c2c7;
      background-color: #fff3cd;
      color: #842029;
      border-radius: 5px;
      margin: 20px auto;
      width: 80%;
      font-size: 14px;
      padding: 10px 15px;
      position: relative;
      text-align: left;
    }

    #inlineErrorBox .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      font-weight: bold;
      cursor: pointer;
      color: #842029;
      background: none;
      border: none;
      font-size: 18px;
    }

    #inlineErrorBox .ok-btn {
      display: block;
      margin: 15px auto 5px auto;
      padding: 5px 20px;
      font-size: 13px;
      font-weight: bold;
      background-color: #842029;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    @media print {
      #printBtn,
      .custom-file-upload,
      .file-hint,
      #inlineErrorBox,#head {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <h1 id="head" class="text-center text-light mb-5" style="background-color: #06005c;">COMFORT FACTORY MRP LABEL GENERATOR</h1>
  <label for="excelFile" class="custom-file-upload">Import</label>
  <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" />
  <small class="file-hint" style="display:block;text-align:center; font-size: x-small; color: rgba(128, 128, 128, 0.836);">File Format: CSV or XLS or XLSX</small>

  <div id="inlineErrorBox">
    <button class="close-btn" onclick="hideInlineError()">×</button>
    <div id="inlineErrorMessage">Error message here</div>
    <button class="ok-btn" onclick="hideInlineError()">OK</button>
  </div>

  <button id="printBtn">Print</button>
  <div id="label-container"></div>

  <template id="label-template">
    <div class="label">
      <div class="vcode-circle">VC</div>
      <div class="label-content">
        <div class="section style"></div>
        <div class="section color"></div>
        <div class="section desc"></div>
        <div class="section size"></div>
        <div class="section qty"></div>
        <div class="section pkd"></div>
        <div class="barcode-container">
          <svg class="barcode"></svg>
          <div class="section batch"></div>
          <div class="section fit"></div>
        </div>
        <div class="section1">
          <span class="bold">Marketed By:</span><br>
          COMFORT FACTORY<br>
          CHERUVANNUR<br>
          FEROKE, KOLATHARA PO<br>
          KOZHIKODE - 673655
        </div>
        <div class="section1" style="margin-top: 1px;">
          For customer complaints<br>
          Contact Us : 8525853666
        </div>
        <div class="mrp">MRP ₹ 0.00<small>(Inclusive of all taxes)</small></div>
      </div>
    </div>
  </template>

  <script>
    const fileInput = document.getElementById('excelFile');
    const importLabel = document.querySelector('.custom-file-upload');
    const fileHint = document.querySelector('.file-hint');
    const printBtn = document.getElementById('printBtn');

    function showInlineError(message) {
      const box = document.getElementById('inlineErrorBox');
      const msgEl = document.getElementById('inlineErrorMessage');
      msgEl.innerHTML = message;
      box.style.display = 'block';
    }

    function hideInlineError() {
      const box = document.getElementById('inlineErrorBox');
      const msgEl = document.getElementById('inlineErrorMessage');
      msgEl.innerHTML = '';
      box.style.display = 'none';
    }

    fileInput.addEventListener('change', function (e) {
      hideInlineError();

      const file = e.target.files[0];
      if (!file) return;

      const fileName = file.name.toLowerCase();
      const allowedTypes = ['.xlsx', '.xls', '.csv'];
      const isValid = allowedTypes.some(ext => fileName.endsWith(ext));

      if (!isValid) {
        showInlineError("❌ Invalid file type.<br>Please upload a .xlsx, .xls, or .csv file.");
        e.target.value = '';
        return;
      }

      importLabel.style.display = 'none';
      fileHint.style.display = 'none';
      printBtn.style.display = 'block';

      const reader = new FileReader();

      reader.onload = function (event) {
        let workbook;
        if (fileName.endsWith('.csv')) {
          const data = event.target.result;
          workbook = XLSX.read(data, { type: 'binary' });
        } else {
          const data = new Uint8Array(event.target.result);
          workbook = XLSX.read(data, { type: 'array' });
        }

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        const rawHeaders = sheetData[0].map(h => String(h).trim());
        const upperHeaders = rawHeaders.map(h => h.toUpperCase());
        const lowerCaseIssues = rawHeaders.filter(h => h !== h.toUpperCase());

        const expectedHeaders = [
          "STYLE CODE", "COLOR", "DESCRIPTION", "SIZE", "NOS",
          "PKD", "EAN", "BATCH", "FIT", "MRP", "QTY", "VCODE"
        ];

        const missingHeaders = expectedHeaders.filter(h => !upperHeaders.includes(h));
        const wrongHeaders = upperHeaders.filter(h => !expectedHeaders.includes(h));

        if (missingHeaders.length > 0 || wrongHeaders.length > 0 || lowerCaseIssues.length > 0) {
          let msg = "❌ <b>Header validation failed!</b><br><br>" +
                    "✅ <b>Expected:</b> " + expectedHeaders.join(", ") + "<br>" +
                    "📤 <b>Found:</b> " + rawHeaders.join(", ") + "<br>";
          if (missingHeaders.length > 0)
            msg += "🟣 <b>Missing:</b> " + missingHeaders.join(", ") + "<br>";
          if (wrongHeaders.length > 0)
            msg += "❗ <b>Extra/Incorrect:</b> " + wrongHeaders.join(", ") + "<br>";
          if (lowerCaseIssues.length > 0)
            msg += "⚠️ <b>Headers must be in UPPERCASE:</b> " + lowerCaseIssues.join(", ");
          showInlineError(msg);
          importLabel.style.display = 'block';
          fileHint.style.display = 'block';
          printBtn.style.display = 'none';
          fileInput.value = '';
          return;
        }

        const dataObjects = XLSX.utils.sheet_to_json(sheet);
        generateLabels(dataObjects);
      };

      if (fileName.endsWith('.csv')) {
        reader.readAsBinaryString(file);
      } else {
        reader.readAsArrayBuffer(file);
      }
    });

    function generateLabels(dataArray) {
      const template = document.getElementById('label-template');
      const container = document.getElementById('label-container');
      container.innerHTML = '';

      dataArray.forEach(data => {
        const qty = parseInt(data['QTY'] || 1, 10);
        for (let i = 0; i < qty; i++) {
          const label = template.content.cloneNode(true);
          const fields = [
            { className: 'style', label: 'STYLE CODE', key: 'STYLE CODE' },
            { className: 'color', label: 'COLOR', key: 'COLOR' },
            { className: 'desc', label: 'DESCRIPTION', key: 'DESCRIPTION' },
            { className: 'size', label: 'SIZE', key: 'SIZE' },
            { className: 'qty', label: 'NET QTY', key: 'NOS' },
            { className: 'batch', label: 'BATCH', key: 'BATCH' },
            { className: 'fit', label: 'FIT', key: 'FIT' },
          ];

          fields.forEach(f => {
            const el = label.querySelector(`.${f.className}`);
            let val = data[f.key];
            if (val !== undefined && val !== null && String(val).trim() !== '') {
              if (f.className === 'color') {
                const colors = String(val).split('/');
                const first = colors[0]?.trim() || '';
                const second = colors[1] ? '/' + colors[1].trim() : '';
                val = `<span class="bold">${f.label}</span> : ${first}` +
                      (second ? `<br><span style="padding-left: 35px;">${second}</span>` : '');
              } else {
                val = `<span class="bold">${f.label}</span> : ${val}`;
              }
              el.innerHTML = val;
            } else {
              el.remove();
            }
          });

          const pkdEl = label.querySelector('.pkd');
          let rawDate = data['PKD'];
          let formattedDate = '';
          if (typeof rawDate === 'number') {
            const excelEpoch = new Date(1899, 11, 30);
            const parsedDate = new Date(excelEpoch.getTime() + rawDate * 86400000);
            formattedDate = `${String(parsedDate.getMonth() + 1).padStart(2, '0')}/${parsedDate.getFullYear()}`;
          } else if (typeof rawDate === 'string' && /^\d{1,2}\/\d{4}$/.test(rawDate.trim())) {
            const [month, year] = rawDate.split('/');
            formattedDate = `${month.padStart(2, '0')}/${year}`;
          } else {
            const parsed = new Date(rawDate);
            if (!isNaN(parsed)) {
              formattedDate = `${String(parsed.getMonth() + 1).padStart(2, '0')}/${parsed.getFullYear()}`;
            } else {
              formattedDate = rawDate || '';
            }
          }
          pkdEl.innerHTML = `<span class="bold">PKD DATE</span> : ${formattedDate}`;

          const barcode = label.querySelector('.barcode');
          const rawBarcode = String(data['EAN'] || '0000000000000').trim();
          setTimeout(() => {
            JsBarcode(barcode, rawBarcode, {
              format: "CODE128",
              width: 1,
              height: 10,
              fontSize: 10,
              textMargin: 0,
              margin: 0,
              fontOptions: "bold",
              displayValue: true
            });
          }, 0);

          const mrp = label.querySelector('.mrp');
          mrp.innerHTML = `MRP ₹ ${data['MRP'] || '0.00'}<small>(Inclusive of all taxes)</small>`;

          const vcodeCircle = label.querySelector('.vcode-circle');
          if (vcodeCircle) {
            vcodeCircle.textContent = data['VCODE'] || '';
          }

          container.appendChild(label);
        }
      });
    }

    document.getElementById('printBtn').addEventListener('click', () => {
      window.print();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Label Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }

        .main-page {
            text-align: center;
            margin-bottom: 20px;
        }

        .generator-page {
            display: none;
        }

        /* Container for all action buttons */
        .button-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 10px;
            gap: 10px;
        }

        /* Styles for the CF MRP and BT MRP buttons */
        #cfBtn, #btBtn {
            margin-top: 10px ;
            margin-bottom: 10px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: rgb(0, 24, 118);
            color: #ffffff;
            border: 2px solid white;
            border-radius: 25px;
        }

        #cfBtn:hover, #btBtn:hover {
            background-color: rgb(0, 14, 72);
        }

        .custom-file-upload {
            padding: 10px 20px;
            background-color: rgb(107, 107, 255);
            color: #ffffff;
            border: 2px solid white;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }

        .custom-file-upload:hover {
            background-color: rgb(77, 77, 255);
        }
        
        .file-hint {
            display: block;
            text-align: center;
            font-size: x-small;
            color: rgba(128, 128, 128, 0.836);
        }

        .action-btn1 {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: rgb(235, 255, 53);
            color: black;
            border: 2px solid white;
            border-radius: 25px;
        }

        .action-btn1:hover {
            background-color: rgb(229, 255, 0);
        }
        
        .action-btn2 {
            display: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: rgb(77, 77, 77);
            color: #ffffff;
            border: 2px solid white;
            border-radius: 25px;
        }

        .action-btn2:hover {
            background-color: rgb(0, 0, 0);
        }
        
        .action-btn3 {
            display: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: rgb(255, 73, 73);
            color: #ffffff;
            border: 2px solid white;
            border-radius: 25px;
        }

        .action-btn3:hover {
            background-color: rgb(255, 52, 52);
        }

        .label {
            width: 1.58in;
            height: 2.36in;
            padding: 0.07in;
            margin-bottom: 5px;
            margin-right: 1px;
            background: #ffffff;
            border-radius: 0.15in;
            box-sizing: border-box;
            font-size: 7px;
            line-height: 1.1;
            overflow: hidden;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            vertical-align: top;
            position: relative;
            border: 1px solid #00000057;
            text-align: left;
        }

        .label-content {
            width: 100%;
        }

        .bold {
            font-weight: bold;
            text-transform: uppercase;
        }

        .section {
            font-size: 8px;
            margin-bottom: 2px;
            font-weight: 800;
        }

        .section1 {
            margin-bottom: 2px;
            font-size: 8px;
        }
        
        /* Updated style for the line with BATCH and FIT */
        .batch-fit-line {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            font-weight: 800;
            margin-bottom: 2px;
            padding-left: 0;
            padding-right: 0;
            text-transform: uppercase;
        }

        .barcode-container {
            text-align: center;
        }

        .barcode {
            width: 85%;
            height: 22.5px;
        }

        .mrp {
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            margin-top: 3px;
        }

        .mrp small {
            display: block;
            font-weight: normal;
            font-size: 8px;
        }
        
        .vcode-circle {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0);
            color: black;
            font-weight: bolder;
            font-size: 8px;
            border-radius: 50%;
            text-align: center;
            line-height: 22px;
            z-index: 10;
            border: none;
        }

        .inline-error-box {
            display: none;
            border: 1px solid #f5c2c7;
            background-color: #fff3cd;
            color: #842029;
            border-radius: 5px;
            margin: 20px auto;
            width: 80%;
            font-size: 14px;
            padding: 10px 15px;
            position: relative;
            text-align: left;
        }

        .inline-error-box .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            font-weight: bold;
            cursor: pointer;
            color: #842029;
            background: none;
            border: none;
            font-size: 18px;
        }

        .inline-error-box .ok-btn {
            display: block;
            margin: 15px auto 5px auto;
            padding: 5px 20px;
            font-size: 13px;
            font-weight: bold;
            background-color: #842029;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        @media print {
            .import-btn-row,
            .button-row,
            .file-hint,
            .inline-error-box,
            .generator-header {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="main-page" class="main-page">
        <h1 class="text-center text-light mb-5" style="background-color: #06005c;">MRP LABEL GENERATOR</h1>
        <button id="cfBtn" class="btn btn-primary">CF MRP</button>
        <button id="btBtn" class="btn btn-secondary">BT MRP</button>
    </div>

    <div id="cfmrp" class="generator-page">
        <h1 id="headCF" class="generator-header text-center text-light mb-5" style="background-color: #06005c;"></h1>
        
        <div class="button-row import-row">
            <button id="mainPageBtnCF" class="action-btn1">Main Page</button>
            <label for="excelFileCF" class="custom-file-upload">Import</label>
            <button id="backBtnCF" class="action-btn2">Back</button>
            <button id="printBtnCF" class="action-btn3">Print</button>
        </div>
        <input type="file" id="excelFileCF" accept=".xlsx, .xls, .csv" style="display: none;" />
        <small class="file-hint file-hint-cf" style="display:block;text-align:center; font-size: x-small; color: rgba(128, 128, 128, 0.836);">File Format: CSV or XLS or XLSX</small>

        <div id="inlineErrorBoxCF" class="inline-error-box">
            <button class="close-btn" onclick="document.getElementById('inlineErrorBoxCF').style.display = 'none';">×</button>
            <div id="inlineErrorMessageCF">Error message here</div>
            <button class="ok-btn" onclick="document.getElementById('inlineErrorBoxCF').style.display = 'none';">OK</button>
        </div>
        
        <div id="label-containerCF"></div>
    </div>

    <div id="btmrp" class="generator-page">
        <h1 id="headBT" class="generator-header text-center text-light mb-5" style="background-color: #06005c;"></h1>

        <div class="button-row import-row">
            <button id="mainPageBtnBT" class="action-btn1">Main Page</button>
            <label for="excelFileBT" class="custom-file-upload">Import</label>
            <button id="backBtnBT" class="action-btn2">Back</button>
            <button id="printBtnBT" class="action-btn3">Print</button>
        </div>
        <input type="file" id="excelFileBT" accept=".xlsx, .xls, .csv" style="display: none;" />
        <small class="file-hint file-hint-bt" style="display:block;text-align:center; font-size: x-small; color: rgba(128, 128, 128, 0.836);">File Format: CSV or XLS or XLSX</small>

        <div id="inlineErrorBoxBT" class="inline-error-box">
            <button class="close-btn" onclick="document.getElementById('inlineErrorBoxBT').style.display = 'none';">×</button>
            <div id="inlineErrorMessageBT">Error message here</div>
            <button class="ok-btn" onclick="document.getElementById('inlineErrorBoxBT').style.display = 'none';">OK</button>
        </div>
        
        <div id="label-containerBT"></div>
    </div>

    <template id="label-template">
        <div class="label">
            <div class="vcode-circle"></div>
            <div class="label-content">
                <div class="section style"></div>
                <div class="section color"></div>
                <div class="section desc"></div>
                <div class="section size"></div>
                <div class="section qty"></div>
                <div class="section pkd"></div>
                <div class="batch-fit-line">
                    <span class="fit"></span>
                    <span class="batch"></span>
                </div>
                <div class="barcode-container">
                    <svg class="barcode"></svg>
                </div>
                <div class="section1">
                    <span>Marketed By:</span><br>
                    <span class="address-content"></span>
                </div>
                <div class="section1" style="margin-top: 1px;">
                    For customer complaints<br>
                    <span class="contact-content"></span>
                </div>
                <div class="mrp">MRP ₹ 0.00<small>(Inclusive of all taxes)</small></div>
            </div>
        </div>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Template Data Object
            const LABEL_TEMPLATES = {
                CF: {
                    title: "CF MRP LABEL GENERATOR",
                    address: [
                        "COMFORT FACTORY",
                        "CHERUVANNUR",
                        "FEROKE, KOLATHARA PO",
                        "KOZHIKODE - 673655"
                    ],
                    contact: "Contact Us : 8525853666",
                    headers: [
                        "STYLE CODE", "COLOR", "DESCRIPTION", "SIZE", "NOS",
                        "PKD", "EAN", "BATCH", "FIT", "MRP", "QTY", "VCODE"
                    ]
                },
                BT: {
                    title: "BT MRP LABEL GENERATOR",
                    address: [
                        "Blue tyga Fashions Pvt.Ltd",
                        "SIDCO Industrial Estate",
                        "Malumichampatti",
                        "Coimbatore - 641050"
                    ],
                    contact: "Mail Us : contact@bluetyga.com",
                    headers: [
                        "STYLE CODE", "COLOR", "DESCRIPTION", "SIZE", "NOS",
                        "PKD", "EAN", "BATCH", "FIT", "MRP", "QTY", "VCODE"
                    ]
                }
            };

            const mainPage = document.getElementById('main-page');
            const cfGeneratorPage = document.getElementById('cfmrp');
            const btGeneratorPage = document.getElementById('btmrp');

            function showPage(pageId, prefix) {
                mainPage.style.display = 'none';
                cfGeneratorPage.style.display = 'none';
                btGeneratorPage.style.display = 'none';
                
                const page = document.getElementById(pageId);
                if (page) {
                    page.style.display = 'block';
                    if (prefix) {
                        const templateData = LABEL_TEMPLATES[prefix];
                        document.getElementById('head' + prefix).textContent = templateData.title;
                    }
                }
            }

            document.getElementById('cfBtn').addEventListener('click', () => showPage('cfmrp', 'CF'));
            document.getElementById('btBtn').addEventListener('click', () => showPage('btmrp', 'BT'));

            function setupLabelGenerator(prefix, templateData) {
                const fileInput = document.getElementById('excelFile' + prefix);
                const importLabel = document.querySelector(`label[for="excelFile${prefix}"]`);
                const fileHint = document.querySelector(`.file-hint-${prefix.toLowerCase()}`);
                const printBtn = document.getElementById('printBtn' + prefix);
                const backBtn = document.getElementById('backBtn' + prefix);
                const labelContainer = document.getElementById('label-container' + prefix);
                const errorBox = document.getElementById('inlineErrorBox' + prefix);
                const errorMessage = document.getElementById('inlineErrorMessage' + prefix);
                const mainPageBtn = document.getElementById('mainPageBtn' + prefix);

                mainPageBtn.addEventListener('click', () => {
                    fileInput.value = '';
                    labelContainer.innerHTML = '';
                    hideInlineError();
                    showPage('main-page');
                });


                function showInlineError(message) {
                    errorMessage.innerHTML = message;
                    errorBox.style.display = 'block';
                }

                function hideInlineError() {
                    errorMessage.innerHTML = '';
                    errorBox.style.display = 'none';
                }

                fileInput.addEventListener('change', function (e) {
                    hideInlineError();
                    const file = e.target.files[0];
                    if (!file) return;

                    const fileName = file.name.toLowerCase();
                    const allowedTypes = ['.xlsx', '.xls', '.csv'];
                    const isValid = allowedTypes.some(ext => fileName.endsWith(ext));

                    if (!isValid) {
                        showInlineError("❌ Invalid file type.<br>Please upload a .xlsx, .xls, or .csv file.");
                        e.target.value = '';
                        return;
                    }

                    importLabel.style.display = 'none';
                    fileHint.style.display = 'none';
                    printBtn.style.display = 'block';
                    backBtn.style.display = 'block';
                    
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        let workbook;
                        if (fileName.endsWith('.csv')) {
                            const data = event.target.result;
                            workbook = XLSX.read(data, { type: 'binary' });
                        } else {
                            const data = new Uint8Array(event.target.result);
                            workbook = XLSX.read(data, { type: 'array' });
                        }

                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rawHeaders = XLSX.utils.sheet_to_json(sheet, { header: 1 })[0].map(h => String(h).trim());
                        const upperCaseHeaders = rawHeaders.map(h => h.toUpperCase());
                        
                        const missingHeaders = templateData.headers.filter(h => !upperCaseHeaders.includes(h));
                        const extraHeaders = upperCaseHeaders.filter(h => !templateData.headers.includes(h));
                        
                        // Check for headers that are not in uppercase
                        const lowerCaseIssues = rawHeaders.filter(h => h !== h.toUpperCase() && templateData.headers.includes(h.toUpperCase()));


                        if (missingHeaders.length > 0 || extraHeaders.length > 0 || lowerCaseIssues.length > 0) {
                            let msg = "❌ <b>Header validation failed!</b><br><br>";
                            msg += "✅ <b>Expected Headers:</b> " + templateData.headers.join(", ") + "<br>";
                            if (missingHeaders.length > 0) {
                                msg += "🔴 <b>Missing Headers:</b> " + missingHeaders.join(", ") + "<br>";
                            }
                            if (extraHeaders.length > 0) {
                                msg += "🔵 <b>Unexpected Headers:</b> " + extraHeaders.join(", ") + "<br>";
                            }
                            if (lowerCaseIssues.length > 0) {
                                msg += "⚠️ <b>Headers must be in UPPERCASE:</b> " + lowerCaseIssues.join(", ") + "<br>";
                            }
                            
                            showInlineError(msg);
                            fileInput.value = '';
                            importLabel.style.display = 'block';
                            fileHint.style.display = 'block';
                            printBtn.style.display = 'none';
                            backBtn.style.display = 'none';
                            return;
                        }

                        const dataObjects = XLSX.utils.sheet_to_json(sheet);
                        generateLabels(dataObjects, labelContainer, templateData);
                    };

                    if (fileName.endsWith('.csv')) {
                        reader.readAsBinaryString(file);
                    } else {
                        reader.readAsArrayBuffer(file);
                    }
                });

                function generateLabels(dataArray, container, templateData) {
                    const template = document.getElementById('label-template');
                    container.innerHTML = '';

                    dataArray.forEach(data => {
                        const qty = parseInt(data['QTY'] || 1, 10);
                        for (let i = 0; i < qty; i++) {
                            const label = template.content.cloneNode(true);
                            
                            const fields = [
                                { className: 'style', label: 'STYLE CODE', key: 'STYLE CODE' },
                                { className: 'color', label: 'COLOR', key: 'COLOR' },
                                { className: 'desc', label: 'DESCRIPTION', key: 'DESCRIPTION' },
                                { className: 'size', label: 'SIZE', key: 'SIZE' },
                                { className: 'qty', label: 'NET QTY', key: 'NOS' }
                            ];

                            fields.forEach(f => {
                                const el = label.querySelector(`.${f.className}`);
                                let val = data[f.key];
                                if (val !== undefined && val !== null && String(val).trim() !== '') {
                                    if (f.className === 'color' && String(val).trim().length > 17) {
                                        const colors = String(val).trim().split('/');
                                        const first = colors[0]?.trim() || '';
                                        const second = colors[1] ? '/' + colors[1].trim() : '';
                                        val = `<span class="bold">${f.label}</span> : ${first}` +
                                            (second ? `<br><span style="padding-left: 35px;">${second}</span>` : '');
                                    } else {
                                        val = `<span class="bold">${f.label}</span> : ${val}`;
                                    }
                                    el.innerHTML = val;
                                } else {
                                    el.remove();
                                }
                            });

                            const pkdEl = label.querySelector('.pkd');
                            let rawDate = data['PKD'];
                            let formattedDate = '';
                            if (typeof rawDate === 'number') {
                                const excelEpoch = new Date(1899, 11, 30);
                                const parsedDate = new Date(excelEpoch.getTime() + rawDate * 86400000);
                                formattedDate = `${String(parsedDate.getMonth() + 1).padStart(2, '0')}/${parsedDate.getFullYear()}`;
                            } else if (typeof rawDate === 'string' && /^\d{1,2}\/\d{4}$/.test(rawDate.trim())) {
                                const [month, year] = rawDate.split('/');
                                formattedDate = `${month.padStart(2, '0')}/${year}`;
                            } else {
                                const parsed = new Date(rawDate);
                                if (!isNaN(parsed)) {
                                    formattedDate = `${String(parsed.getMonth() + 1).padStart(2, '0')}/${parsed.getFullYear()}`;
                                } else {
                                    formattedDate = rawDate || '';
                                }
                            }
                            pkdEl.innerHTML = `<span class="bold">PKD DATE</span> : ${formattedDate}`;
                            
                            const batchFitLine = label.querySelector('.batch-fit-line');
                            const batchSpan = label.querySelector('.batch');
                            const fitSpan = label.querySelector('.fit');
                            const batchVal = data['BATCH'];
                            const fitVal = data['FIT'];

                            if (fitVal) {
                                fitSpan.textContent = fitVal;
                            } else {
                                fitSpan.remove();
                            }

                            if (batchVal) {
                                batchSpan.textContent = batchVal;
                            } else {
                                batchSpan.remove();
                            }
                            
                            if (!batchVal && !fitVal) {
                                batchFitLine.remove();
                            }

                            const barcode = label.querySelector('.barcode');
                            const rawBarcode = String(data['EAN'] || '0000000000000').trim();
                            setTimeout(() => {
                                JsBarcode(barcode, rawBarcode, {
                                    format: "CODE128",
                                    width: 1,
                                    height: 10,
                                    fontSize: 10,
                                    textMargin: 0,
                                    margin: 0,
                                    fontOptions: "bold",
                                    displayValue: true
                                });
                            }, 0);

                            const mrp = label.querySelector('.mrp');
                            mrp.innerHTML = `MRP ₹ ${data['MRP'] || '0.00'}<small>(Inclusive of all taxes)</small>`;

                            const vcodeCircle = label.querySelector('.vcode-circle');
                            if (vcodeCircle) {
                                vcodeCircle.textContent = data['VCODE'] || '';
                            }

                            const addressEl = label.querySelector('.address-content');
                            if (addressEl) addressEl.innerHTML = templateData.address.join("<br>");
                            
                            const contactEl = label.querySelector('.contact-content');
                            if (contactEl) contactEl.textContent = templateData.contact;

                            container.appendChild(label);
                        }
                    });
                }

                backBtn.addEventListener('click', () => {
                    fileInput.value = '';
                    importLabel.style.display = 'block';
                    fileHint.style.display = 'block';
                    printBtn.style.display = 'none';
                    backBtn.style.display = 'none';
                    labelContainer.innerHTML = '';
                    hideInlineError();
                });

                printBtn.addEventListener('click', () => {
                    window.print();
                });
            }

            setupLabelGenerator('CF', LABEL_TEMPLATES.CF);
            setupLabelGenerator('BT', LABEL_TEMPLATES.BT);
        });
    </script>
</body>
</html>
